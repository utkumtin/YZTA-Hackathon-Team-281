version: '3.8'

services:
  app:
    build: .
    container_name: kobiops_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://app:app@db:5432/kobiops
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - OWNER_TELEGRAM_ID=${OWNER_TELEGRAM_ID}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - LLM_PROVIDER=gemini
      - LLM_MODEL=gemini-2.5-flash
      - ENV=dev
      - DEMO_MODE_ENABLED=true
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy

  db:
    image: pgvector/pgvector:pg16
    container_name: kobiops_db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=app
      - POSTGRES_PASSWORD=app
      - POSTGRES_DB=kobiops
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d kobiops"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
